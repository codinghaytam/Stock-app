version: '3.9'

services:

  # ── Backend (Spring Boot) ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: olivepro-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      # ── PostgreSQL (Neon external) ─────────────────────────────────────────
      SPRING_DATASOURCE_URL: ${DB_URL:-jdbc:postgresql://ep-little-leaf-ad3ej5bo-pooler.c-2.us-east-1.aws.neon.tech/neondb?sslmode=require}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-neondb_owner}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-npg_wpGYxiXI8qn4}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${DB_DDL_AUTO:-update}
      # ── JWT Configuration ─────────────────────────────────────────────────
      APP_JWT_SECRET: ${JWT_SECRET:-XsQklMNNq9QNv2NlB9ZpzYXFxZizJQF3cAA7edZv8pB}
      APP_JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      # ── CORS Configuration ────────────────────────────────────────────────
      APP_CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:-*}
      # ── Database & Logging ────────────────────────────────────────────────
      SPRING_JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      SPRING_DATASOURCE_HIKARI_SSL: ${DB_SSL:-true}
      SPRING_DATASOURCE_HIKARI_DATA_SOURCE_PROPERTIES_SSL_MODE: ${DB_SSL_MODE:-require}
      LOGGING_LEVEL_COM_OLIVEPRO: ${LOG_LEVEL:-INFO}
      LOGGING_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-WARN}
      # ── JVM Tuning ────────────────────────────────────────────────────────
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx512m -XX:+UseG1GC}
      # ── Application Settings ─────────────────────────────────────────────
      APP_FUEL_LOW_STOCK_THRESHOLD: ${FUEL_LOW_STOCK_THRESHOLD:-500}
      # ── Observability ────────────────────────────────────────────────────
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4318}
    networks:
      - olivepro-net
    depends_on:
      - tempo

  # ── Frontend (Vite build → nginx) ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: olivepro-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      # ── Backend URLs (injected at runtime by docker-entrypoint.sh) ────────
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
      VITE_WEBSOCKET_URL: ${VITE_WEBSOCKET_URL:-ws://localhost:8080/ws/alerts}
    networks:
      - olivepro-net
  # ── Prometheus (metrics collection) ────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: olivepro-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - olivepro-net

  # ── Tempo (distributed tracing) ────────────────────────────────────────────
  tempo:
    image: grafana/tempo:latest
    container_name: olivepro-tempo
    restart: unless-stopped
    ports:
      - "3200:3200"   # HTTP API
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    command: [ "-config.file=/etc/tempo.yml" ]
    volumes:
      - ./tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/home/haytam/Work/projects/olive/tempo
    networks:
      - olivepro-net

  # ── Loki (log aggregation) ─────────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: olivepro-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    networks:
      - olivepro-net

  # ── Grafana (dashboards & visualization) ───────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: olivepro-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      # Allow provisioned datasources to overwrite
      GF_DATASOURCES_DEFAULT_DATA_SOURCE_MODE: file
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
      - tempo
      - loki
    networks:
      - olivepro-net

networks:
  olivepro-net:
    driver: bridge

volumes:
  prometheus-data:
  tempo-data:
  grafana-data:

