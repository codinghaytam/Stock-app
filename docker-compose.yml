version: '3.9'

services:

  # ── Backend (Spring Boot) ──────────────────────────────────────────────────
  backend:
    image: haytam265684/backend-olive:0.5.0
    container_name: olivepro-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      # ── PostgreSQL ───────────────────────────────────────────────────────
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${DB_DDL_AUTO:-update}
      # ── JWT ──────────────────────────────────────────────────────────────
      APP_JWT_SECRET: ${JWT_SECRET}
      APP_JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      # ── CORS ─────────────────────────────────────────────────────────────
      APP_CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN}
      # ── Database & Logging ────────────────────────────────────────────────
      SPRING_JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      SPRING_DATASOURCE_HIKARI_SSL: ${DB_SSL:-true}
      SPRING_DATASOURCE_HIKARI_DATA_SOURCE_PROPERTIES_SSL_MODE: ${DB_SSL_MODE:-require}
      LOGGING_LEVEL_COM_OLIVEPRO: ${LOG_LEVEL:-INFO}
      LOGGING_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-WARN}
      # ── JVM Tuning ────────────────────────────────────────────────────────
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx512m -XX:+UseG1GC}
      # ── Application Settings ──────────────────────────────────────────────
      APP_FUEL_LOW_STOCK_THRESHOLD: ${FUEL_LOW_STOCK_THRESHOLD:-500}
      # ── Observability ─────────────────────────────────────────────────────
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4318}
    networks:
      - olivepro-net
    depends_on:
      - tempo

  # ── Frontend (Vite → nginx) ────────────────────────────────────────────────
  frontend:
    image: haytam265684/frontend-olive:0.5.0
    container_name: olivepro-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      VITE_WEBSOCKET_URL: ${VITE_WEBSOCKET_URL}
    networks:
      - olivepro-net
    depends_on:
      - backend

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: olivepro-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - olivepro-net

  # ── Tempo ──────────────────────────────────────────────────────────────────
  tempo:
    image: grafana/tempo:latest
    container_name: olivepro-tempo
    restart: unless-stopped
    ports:
      - "3200:3200"   # HTTP API
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    command: [ "-config.file=/etc/tempo.yml" ]
    volumes:
      - ./tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/var/tempo
    networks:
      - olivepro-net

  # ── Loki ───────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: olivepro-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    networks:
      - olivepro-net

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: olivepro-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_DATASOURCES_DEFAULT_DATA_SOURCE_MODE: file
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
      - tempo
      - loki
    networks:
      - olivepro-net

networks:
  olivepro-net:
    driver: bridge

volumes:
  prometheus-data:
  tempo-data:
  grafana-data: