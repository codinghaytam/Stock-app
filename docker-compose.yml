
services:

  # ── Backend (Spring Boot) ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: olivepro-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # ── Neon PostgreSQL (external) ──────────────────────────────────────────
      SPRING_DATASOURCE_URL: ${NEON_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${NEON_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${NEON_DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      # Neon uses TLS — required
      SPRING_DATASOURCE_HIKARI_SSL: "true"
      SPRING_DATASOURCE_HIKARI_DATA_SOURCE_PROPERTIES_SSL_MODE: require
      # ── JWT ─────────────────────────────────────────────────────────────────
      APP_JWT_SECRET: ${JWT_SECRET}
      APP_JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      # ── CORS (point to frontend origin) ────────────────────────────────────
      APP_CORS_ALLOWED_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:80}
      # ── Fuel threshold ──────────────────────────────────────────────────────
      APP_FUEL_LOW_STOCK_THRESHOLD: ${FUEL_LOW_STOCK_THRESHOLD:-500}
      # ── Logging ─────────────────────────────────────────────────────────────
      LOGGING_LEVEL_COM_OLIVEPRO: ${LOG_LEVEL:-INFO}
      # ── JVM opts ────────────────────────────────────────────────────────────
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx512m -XX:+UseG1GC}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/auth/me || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - olivepro-net

  # ── Frontend (Vite build → nginx) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: olivepro-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      # These are read by docker-entrypoint.sh at startup and written to /env.js
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
      VITE_WEBSOCKET_URL: ${VITE_WEBSOCKET_URL:-ws://localhost:8080/ws/alerts}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - olivepro-net
  grafana:
    image: grafana/grafana:latest
    ports: [ "3000:3000" ]

  prometheus:
    image: prom/prometheus:latest
    ports: [ "9090:9090" ]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  loki:
    image: grafana/loki:latest
    ports: [ "3100:3100" ]

  tempo:
    image: grafana/tempo:latest
    ports: [ "4318:4318", "3200:3200" ]
    command: -config.file=/etc/tempo.yml
    volumes:
      - ./tempo.yml:/etc/tempo.yml

networks:
  olivepro-net:
    driver: bridge

