apiVersion: 1

datasources:
  # ── Prometheus (Metrics) ──────────────────────────────────────────────────
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    version: 1
    jsonData:
      exemplarTraceIdDestination:
        name: traceID
        datasourceUid: tempo
      queryTimeout: 60s
      tlsSkipVerify: false

  # ── Tempo (Traces) ────────────────────────────────────────────────────────
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    editable: true
    version: 1
    uid: tempo
    jsonData:
      tracesToMetrics:
        datasourceUid: prometheus
      tracesToLogs:
        datasourceUid: loki
        tags:
          - job
          - instance
          - pod
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      lokiSearch:
        enabled: true

  # ── Loki (Logs) ───────────────────────────────────────────────────────────
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: true
    version: 1
    uid: loki
    jsonData:
      derivedFields:
        - name: traceID
          matcherRegex: '"traceId"\s*:\s*"([^"]+)"'
          url: $${__value.raw}
          datasourceUid: tempo

