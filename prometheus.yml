global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    app: olivepro

scrape_configs:
  # Self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: [ 'localhost:9090' ]

  # Spring Boot backend (Micrometer → /actuator/prometheus)
  - job_name: olivepro-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ 'backend:8080' ]
    relabel_configs:
      - source_labels: [ __address__ ]
        target_label: instance
        replacement: olivepro-backend

